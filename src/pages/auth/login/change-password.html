<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ganti Password — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-auth-wrap">
    <form class="hg-auth-card" id="cpForm">
      <h1>Ganti Password</h1>
      <p class="sub">Login pertama Anda wajib mengganti password bawaan.</p>

      <div class="hg-field">
        <label class="hg-label">Password Baru</label>
        <input class="hg-input" type="password" id="newPassword" minlength="8" required />
      </div>
      <div class="hg-field">
        <label class="hg-label">Ulangi Password Baru</label>
        <input class="hg-input" type="password" id="confirmPassword" minlength="8" required />
      </div>
      <button class="hg-btn hg-btn--accent" style="width:100%; justify-content:center" type="submit">Simpan & Lanjutkan</button>
      <p class="hg-error" id="errorMsg" style="display:none"></p>
    </form>
  </div>

  <script src="/src/config.js"></script>
  <script type="module" src="./change-password.js"></script>
</body>
</html>
