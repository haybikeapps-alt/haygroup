<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kategori Produk — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar"><h1>Kategori Produk</h1></div>

      <div class="hg-card">
        <form id="categoryForm" class="hg-grid-3" style="align-items:end; margin-bottom:16px">
          <div class="hg-field" style="margin:0"><label class="hg-label">Unit Usaha</label><select class="hg-select" id="fStore" required></select></div>
          <div class="hg-field" style="margin:0"><label class="hg-label">Nama Kategori</label><input class="hg-input" id="fName" required /></div>
          <button class="hg-btn hg-btn--accent" type="submit">+ Tambah Kategori</button>
        </form>

        <table class="hg-table">
          <thead><tr><th>Nama</th><th>Unit Usaha</th><th>Status</th><th></th></tr></thead>
          <tbody id="rows"><tr><td colspan="4">Memuat...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="/src/config.js"></script>
  <script type="module" src="./categories.js"></script>
</body>
</html>
