<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pengguna & Peran — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar">
        <h1>Pengguna & Peran</h1>
        <button class="hg-btn hg-btn--accent" id="newBtn">+ Pengguna Baru</button>
      </div>

      <div class="hg-card">
        <table class="hg-table">
          <thead><tr><th>Nama</th><th>Email</th><th>Peran</th><th>Unit Usaha</th><th>Status</th><th></th></tr></thead>
          <tbody id="rows"><tr><td colspan="6">Memuat...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <dialog id="modal" style="border:none; border-radius:12px; padding:0; width:460px; max-width:92vw">
    <form id="userForm" style="padding:22px">
      <h3 style="margin-top:0">Pengguna Baru</h3>
      <div class="hg-field"><label class="hg-label">Nama Lengkap</label><input class="hg-input" id="fName" required /></div>
      <div class="hg-field"><label class="hg-label">Email</label><input class="hg-input" type="email" id="fEmail" required /></div>
      <div class="hg-field"><label class="hg-label">Peran</label><select class="hg-select" id="fRole" required></select></div>
      <div class="hg-field"><label class="hg-label">Unit Usaha (bisa lebih dari satu)</label>
        <select class="hg-select" id="fStores" multiple size="3"></select>
      </div>
      <p style="font-size:.8rem; color:#64748b">Password awal: <code>Haygroup#2026</code> (wajib diganti saat login pertama).</p>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px">
        <button type="button" class="hg-btn hg-btn--outline" id="closeBtn">Batal</button>
        <button type="submit" class="hg-btn hg-btn--accent">Buat Akun</button>
      </div>
    </form>
  </dialog>

  <script src="/src/config.js"></script>
  <script type="module" src="./users.js"></script>
</body>
</html>
