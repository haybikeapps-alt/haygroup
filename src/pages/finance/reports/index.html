<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Laporan Keuangan — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar"><h1>Laporan Keuangan</h1></div>

      <div class="hg-card">
        <div class="hg-grid-3" style="align-items:end">
          <div class="hg-field" style="margin:0"><label class="hg-label">Jenis Laporan</label>
            <select class="hg-select" id="reportType">
              <option value="income_statement">Laba Rugi</option>
              <option value="balance_sheet">Neraca</option>
              <option value="equity_changes">Perubahan Ekuitas</option>
              <option value="cash_flow">Arus Kas</option>
            </select>
          </div>
          <div class="hg-field" style="margin:0"><label class="hg-label">Dari Tanggal</label><input class="hg-input" type="date" id="startDate" /></div>
          <div class="hg-field" style="margin:0"><label class="hg-label">Sampai Tanggal</label><input class="hg-input" type="date" id="endDate" /></div>
        </div>
        <button class="hg-btn hg-btn--accent" id="generateBtn" style="margin-top:14px">Tampilkan Laporan</button>
      </div>

      <div class="hg-card" id="reportOutput"><p style="color:#94a3b8">Pilih jenis laporan dan rentang tanggal, lalu klik Tampilkan.</p></div>
    </main>
  </div>

  <script src="/src/config.js"></script>
  <script type="module" src="./reports.js"></script>
</body>
</html>
