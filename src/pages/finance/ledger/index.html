<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buku Besar — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar"><h1>Buku Besar</h1></div>

      <div class="hg-card">
        <div class="hg-grid-3" style="align-items:end">
          <div class="hg-field" style="margin:0"><label class="hg-label">Akun</label><select class="hg-select" id="accountSelect"></select></div>
          <div class="hg-field" style="margin:0"><label class="hg-label">Dari Tanggal</label><input class="hg-input" type="date" id="startDate" /></div>
          <div class="hg-field" style="margin:0"><label class="hg-label">Sampai Tanggal</label><input class="hg-input" type="date" id="endDate" /></div>
        </div>
        <button class="hg-btn hg-btn--accent" id="loadBtn" style="margin-top:14px">Tampilkan</button>
      </div>

      <div class="hg-card" id="output"><p style="color:#94a3b8">Pilih akun dan rentang tanggal.</p></div>
    </main>
  </div>

  <script src="/src/config.js"></script>
  <script type="module" src="./ledger.js"></script>
</body>
</html>
