<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aset Tetap — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar">
        <h1>Aset Tetap</h1>
        <button class="hg-btn hg-btn--accent" id="newBtn">+ Aset Baru</button>
      </div>

      <div class="hg-card">
        <div class="hg-grid-3" style="align-items:end">
          <div class="hg-field" style="margin:0"><label class="hg-label">Tahun</label><input class="hg-input" type="number" id="depYear" /></div>
          <div class="hg-field" style="margin:0"><label class="hg-label">Bulan</label>
            <select class="hg-select" id="depMonth">
              ${Array.from({length:12},(_,i)=>`<option value="${i+1}">${i+1}</option>`).join("")}
            </select>
          </div>
          <button class="hg-btn hg-btn--outline" id="depBtn">Hitung & Jurnal Penyusutan Bulan Ini</button>
        </div>
      </div>

      <div class="hg-card">
        <table class="hg-table">
          <thead><tr><th>Kode</th><th>Nama Aset</th><th>Tgl. Perolehan</th><th>Harga Perolehan</th><th>Umur (bln)</th><th>Metode</th><th>Status</th></tr></thead>
          <tbody id="rows"><tr><td colspan="7">Memuat...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <dialog id="modal" style="border:none; border-radius:12px; padding:0; width:460px; max-width:92vw">
    <form id="assetForm" style="padding:22px">
      <h3 style="margin-top:0">Aset Tetap Baru</h3>
      <div class="hg-field"><label class="hg-label">Kode Aset</label><input class="hg-input" id="fCode" required /></div>
      <div class="hg-field"><label class="hg-label">Nama Aset</label><input class="hg-input" id="fName" required /></div>
      <div class="hg-grid-2">
        <div class="hg-field"><label class="hg-label">Kategori</label><input class="hg-input" id="fCategory" /></div>
        <div class="hg-field"><label class="hg-label">Lokasi</label><input class="hg-input" id="fLocation" /></div>
      </div>
      <div class="hg-field"><label class="hg-label">Tanggal Perolehan</label><input class="hg-input" type="date" id="fDate" required /></div>
      <div class="hg-grid-2">
        <div class="hg-field"><label class="hg-label">Harga Perolehan</label><input class="hg-input" type="number" id="fCost" required /></div>
        <div class="hg-field"><label class="hg-label">Nilai Residu</label><input class="hg-input" type="number" id="fResidual" value="0" /></div>
      </div>
      <div class="hg-grid-2">
        <div class="hg-field"><label class="hg-label">Umur Manfaat (bulan)</label><input class="hg-input" type="number" id="fLife" required /></div>
        <div class="hg-field"><label class="hg-label">Metode Penyusutan</label>
          <select class="hg-select" id="fMethod">
            <option value="straight_line">Garis Lurus</option>
            <option value="declining_balance">Saldo Menurun</option>
          </select>
        </div>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px">
        <button type="button" class="hg-btn hg-btn--outline" id="closeBtn">Batal</button>
        <button type="submit" class="hg-btn hg-btn--accent">Simpan</button>
      </div>
    </form>
  </dialog>

  <script src="/src/config.js"></script>
  <script type="module" src="./fixed-assets.js"></script>
</body>
</html>
