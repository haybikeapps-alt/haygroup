<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hutang Usaha — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar">
        <h1>Hutang Usaha</h1>
        <div style="display:flex; gap:8px">
          <button class="hg-btn hg-btn--outline" id="newSupplierBtn">+ Supplier</button>
          <button class="hg-btn hg-btn--accent" id="newBtn">+ Hutang Baru</button>
        </div>
      </div>
      <div class="hg-card">
        <table class="hg-table">
          <thead><tr><th>No. Invoice Supplier</th><th>Supplier</th><th>Jatuh Tempo</th><th>Total</th><th>Terbayar</th><th>Sisa</th><th>Status</th><th></th></tr></thead>
          <tbody id="rows"><tr><td colspan="8">Memuat...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <dialog id="newModal" style="border:none; border-radius:12px; padding:0; width:460px; max-width:92vw">
    <form id="newForm" style="padding:22px">
      <h3 style="margin-top:0">Hutang Usaha Baru</h3>
      <div class="hg-field"><label class="hg-label">Supplier</label><select class="hg-select" id="fSupplier" required></select></div>
      <div class="hg-field"><label class="hg-label">No. Invoice Supplier</label><input class="hg-input" id="fInvoiceNumber" required /></div>
      <div class="hg-grid-2">
        <div class="hg-field"><label class="hg-label">Tanggal Invoice</label><input class="hg-input" type="date" id="fInvoiceDate" required /></div>
        <div class="hg-field"><label class="hg-label">Jatuh Tempo</label><input class="hg-input" type="date" id="fDueDate" required /></div>
      </div>
      <div class="hg-field"><label class="hg-label">Total Hutang</label><input class="hg-input" type="number" id="fTotal" required /></div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px">
        <button type="button" class="hg-btn hg-btn--outline" id="closeNewBtn">Batal</button>
        <button type="submit" class="hg-btn hg-btn--accent">Simpan</button>
      </div>
    </form>
  </dialog>

  <dialog id="payModal" style="border:none; border-radius:12px; padding:0; width:360px; max-width:92vw">
    <form id="payForm" style="padding:22px">
      <h3 style="margin-top:0">Bayar Hutang</h3>
      <input type="hidden" id="payPayableId" />
      <div class="hg-field"><label class="hg-label">Nominal Pembayaran</label><input class="hg-input" type="number" id="payAmount" required /></div>
      <div class="hg-field"><label class="hg-label">Metode</label>
        <select class="hg-select" id="payMethod"><option value="cash">Tunai</option><option value="transfer">Transfer Bank</option></select>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:14px">
        <button type="button" class="hg-btn hg-btn--outline" id="closePayBtn">Batal</button>
        <button type="submit" class="hg-btn hg-btn--accent">Bayar</button>
      </div>
    </form>
  </dialog>

  <script src="/src/config.js"></script>
  <script type="module" src="./payables.js"></script>
</body>
</html>
