<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bagan Akun — HayGroup</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>
  <div class="hg-layout">
    <aside class="hg-sidebar" id="sidebar"></aside>
    <main class="hg-main">
      <div class="hg-topbar">
        <h1>Bagan Akun (COA)</h1>
        <button class="hg-btn hg-btn--accent" id="newBtn">+ Akun Baru</button>
      </div>
      <div class="hg-card">
        <table class="hg-table">
          <thead><tr><th>Kode</th><th>Nama Akun</th><th>Tipe</th><th>Saldo Normal</th><th>Status</th></tr></thead>
          <tbody id="rows"><tr><td colspan="5">Memuat...</td></tr></tbody>
        </table>
      </div>
    </main>
  </div>

  <dialog id="modal" style="border:none; border-radius:12px; padding:0; width:420px; max-width:92vw">
    <form id="accForm" style="padding:22px">
      <h3 style="margin-top:0">Akun Baru</h3>
      <div class="hg-field"><label class="hg-label">Kode Akun</label><input class="hg-input" id="fCode" required /></div>
      <div class="hg-field"><label class="hg-label">Nama Akun</label><input class="hg-input" id="fName" required /></div>
      <div class="hg-field"><label class="hg-label">Tipe</label>
        <select class="hg-select" id="fType">
          <option value="asset">Aset</option><option value="liability">Liabilitas</option>
          <option value="equity">Ekuitas</option><option value="revenue">Pendapatan</option>
          <option value="expense">Beban</option>
        </select>
      </div>
      <div class="hg-field"><label class="hg-label">Saldo Normal</label>
        <select class="hg-select" id="fNormal"><option value="debit">Debit</option><option value="credit">Kredit</option></select>
      </div>
      <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px">
        <button type="button" class="hg-btn hg-btn--outline" id="closeBtn">Batal</button>
        <button type="submit" class="hg-btn hg-btn--accent">Simpan</button>
      </div>
    </form>
  </dialog>

  <script src="/src/config.js"></script>
  <script type="module" src="./coa.js"></script>
</body>
</html>
